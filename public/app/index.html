<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Play a fast, browser-based Video Game Music quiz with multiple modes and composers/titles matching. No account required.">
<link rel="canonical" href="https://nantes-rfli.github.io/vgm-quiz/app/">
<script>
  // Early seed: honor ?lang=xx before any module runs (stabilizes E2E and SR's first language)
  (function() {
    try {
      var p = new URLSearchParams(location.search);
      var lang = p.get('lang');
      if (lang) {
        document.documentElement.setAttribute('lang', lang);
        // Seed <title> early so E2E can assert localized title without waiting for modules.
        // i18n.mjs may later normalize; this is a harmless early hint.
        var t = document.title || '';
        if (lang === 'ja') {
          if (!/VGM.?クイズ/.test(t)) document.title = 'VGMクイズ';
        } else if (lang === 'en') {
          if (!/VGM.?Quiz/.test(t)) document.title = 'VGM Quiz';
        }
      }
    } catch (e) {}
  })();
</script>
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#111111">
<title>VGM Quiz</title>
<link rel="manifest" href="manifest.webmanifest">
<!-- ESM の事前解決は modulepreload を使う。credentials 警告回避に crossorigin を明示 -->
<link rel="modulepreload" href="app.js" crossorigin="anonymous">
<!-- Load AUTO helpers lazily to avoid extra network/parse work -->
<script type="module" src="./boot_auto.mjs"></script>

  <script>
    // Conditionally load test API when ?mock=1
    (function() {
      var p = new URLSearchParams(location.search);
      if (p.get("mock") === "1") {
        var s = document.createElement("script");
        s.src = "./mock_api.js";
        s.defer = true;
        document.head.appendChild(s);
      }
    })();
  </script>
  <script defer src="./sw_update.js"></script>
<!-- Open Graph (optional but useful for previews) -->
<meta property="og:title" content="VGM Quiz">
<meta property="og:description" content="Play a fast, browser-based Video Game Music quiz with multiple modes and composers/titles matching.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nantes-rfli.github.io/vgm-quiz/app/">

<a href="#main" class="skip-link">Skip to main content</a>
<h1>VGM Quiz</h1>
<main id="main">

<div id="start-view" data-testid="start-view">
  <fieldset>
    <legend>Question types</legend>
    <label><input type="checkbox" id="type-title-game" name="qtype" value="title-game" checked data-testid="qtype-title-game"> title→game</label>
    <label><input type="checkbox" id="type-game-composer" name="qtype" value="game-composer" checked data-testid="qtype-game-composer"> game→composer</label>
    <label><input type="checkbox" id="type-title-composer" name="qtype" value="title-composer" checked data-testid="qtype-title-composer"> title→composer</label>
  </fieldset>
  <label>Mode:
    <select id="mode">
      <option value="multiple-choice">4択</option>
      <option value="free">自由入力</option>
    </select>
  </label>
  <label style="margin-left:8px">
    <input type="checkbox" id="timer20"> タイマー(20s)
  </label>
  <fieldset style="margin-top:8px">
    <legend>AUTO mode</legend>
    <label>
      <input type="checkbox" id="auto-enabled" data-testid="auto-enabled"> AUTOを有効にする
    </label>
    <div class="sr-only" aria-hidden="false">キーボード操作で Tab → Enter だけで回答できます。</div>
  </fieldset>
  <label>Number of questions
    <select id="count">
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="20">20</option>
    </select>
  </label>
<button id="start-btn" disabled data-testid="start-btn" aria-controls="question-view">Start</button>
  <div id="dataset-error" style="display:none;color:red;"></div>
  <button id="history-btn" aria-controls="history-view">History</button>
  <button id="export-aliases-btn">Export alias proposals (.edn)</button>
</div>

<div id="history-view" style="display:none" role="region" aria-labelledby="history-heading">
  <h2 id="history-heading" class="visually-hidden">History</h2>
  <ul id="history-list"></ul>
  <button id="clear-history-btn">Clear history</button>
  <button id="history-back-btn" aria-controls="start-view">Back</button>
</div>

<div id="question-view" style="display:none" data-testid="quiz-view">
  <div id="hud">
    <div id="lives" aria-label="lives" aria-live="polite" aria-atomic="true" data-testid="lives"></div>
    <div id="timer" aria-label="timer" aria-live="polite" aria-atomic="true" data-testid="timer"></div>
  </div>
  <div
    id="score-bar"
    role="progressbar"
    aria-label="score bar"
    aria-valuemin="0"
    aria-valuemax="100"
    aria-live="polite"
    aria-atomic="true"
    data-testid="score-bar"></div>
  <div id="countdown" aria-live="polite" aria-atomic="true" style="display:none; margin-top:6px;" data-testid="countdown"></div>
  <div id="media-slot" aria-label="audio preview area"></div>
  <div id="prompt" role="status" aria-live="polite" aria-atomic="true" data-testid="prompt"></div>
  <div id="choices" style="display:none; margin-top:8px" role="group" aria-label="Choices" aria-describedby="prompt">
    <button class="choice" aria-label="choice 1"></button>
    <button class="choice" aria-label="choice 2"></button>
    <button class="choice" aria-label="choice 3"></button>
    <button class="choice" aria-label="choice 4"></button>
  </div>
  <label for="answer">Your answer</label>
  <input id="answer" type="text" autocomplete="off" aria-describedby="prompt" autofocus data-testid="answer">
  <button id="submit-btn" data-testid="submit-btn">Submit</button>
  <button id="next-btn" style="display:none">Next</button>
  <div id="feedback" role="status" aria-live="polite" aria-atomic="true"></div>
  <button id="propose-alias-btn" style="display:none">別名として提案</button>
</div>

<div
  id="result-view"
  role="dialog" aria-modal="true" aria-labelledby="final-score" tabindex="-1"
  style="display:none" data-testid="result-dialog">
  <div id="final-score"></div>
  <div id="summary">
    <h2>Summary</h2>
    <ul id="summary-list"></ul>
  </div>
  <div id="share-actions" style="margin:8px 0">
    <button id="copy-result-btn" data-testid="copy-result-btn">結果をコピー</button>
    <button id="share-result-btn" data-testid="share-result-btn" style="display:none">共有…</button>
    <span id="copy-toast" role="status" aria-live="polite" style="margin-left:8px;"></span>
  </div>
  <button id="restart-btn" aria-controls="start-view">Restart</button>
</div>

<footer id="version" role="contentinfo"></footer>

<style>
  /* Visually-hidden but keyboard-focusable skip link */
  .skip-link {
    position:absolute; left:-9999px; top:auto; width:1px; height:1px; overflow:hidden;
  }
  .skip-link:focus, .skip-link:focus-visible {
    position:static; width:auto; height:auto; padding:6px 10px; outline:2px solid; display:inline-block;
  }
  /* Ensure keyboard focus is clearly visible for interactive elements */
  :focus-visible {
    outline: 2px solid;
    outline-offset: 2px;
  }

  /* === v1.4 UI polish & responsive === */
  :root{
    --bg:#0b0c10;
    --panel:#111318;
    --text:#e5e7eb;
    --muted:#a1a1aa;
    --border:#2b2f36;
    --accent:#2563eb;
    --accent-fg:#ffffff;
    --focus:#60a5fa;

    /* === v1.5 design tokens (boot only; not wired yet) === */
    /* Spacing scale */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;

    /* Radius scale */
    --radius-1: 8px;
    --radius-2: 12px;
    --radius-3: 16px;

    /* Shadows (dark theme tuned) */
    --shadow-1: 0 1px 2px rgba(0,0,0,.18);
    --shadow-2: 0 4px 12px rgba(0,0,0,.22);

    /* Typography */
    --font-size-sm: 14px;
    --font-size-base: 16px;
    --font-size-lg: 18px;

    /* Motion */
    --duration-fast: 120ms;
    --duration-base: 160ms;
    --easing-out: cubic-bezier(.2,.8,.2,1);

    /* Layout */
    --container-max: 880px;
    --grid-gap: 12px;
    --touch-target: 44px;
    /* === end v1.5 tokens === */
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#ffffff;
      --panel:#f9fafb;
      --text:#111827;
      --muted:#6b7280;
      --border:#d1d5db;
      --accent:#1d4ed8;
      --accent-fg:#ffffff;
      --focus:#1e40af;
    }
  }

  html,body{background:var(--bg);color:var(--text);}
  main{max-width:880px;margin:0 auto;padding:16px;}

  header h1{font-size:clamp(24px,4vw,36px);margin:16px 16px 0;}

  fieldset{border:1px solid var(--border);border-radius:12px;padding:12px;margin:14px 0;background:var(--panel);}
  legend{padding:0 8px;color:var(--muted);}

  label{display:inline-flex;align-items:center;gap:8px;}

  input[type="text"], select, input[type="number"]{
    background:#0f1115;
    color:var(--text);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    min-height:44px;
  }
  @media (prefers-color-scheme: light){
    input[type="text"], select, input[type="number"]{ background:#fff; }
  }

  button{
    appearance:none;
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--text);
    border-radius:12px;
    min-height:var(--touch-target);
    padding:10px 14px;
    cursor:pointer;
    transition: transform var(--duration-fast) var(--easing-out), opacity var(--duration-fast) var(--easing-out);
  }
  button:hover{filter:brightness(1.05)}
  button:active{transform:translateY(1px)}
  button:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:2px;
  }

  #start-btn, #submit-btn, #next-btn, #restart-btn{
    background:var(--accent);
    color:var(--accent-fg);
    border-color:transparent;
  }

  #choices{
    display:grid;
    gap: var(--grid-gap);
    grid-template-columns:repeat(2, minmax(0,1fr));
  }
  #choices button{font-size:16px;}
  @media (min-width:640px){
    #choices{ grid-template-columns:repeat(3, minmax(0,1fr)); }
  }
  @media (min-width:960px){
    #choices{ grid-template-columns:repeat(4, minmax(0,1fr)); }
  }

  #hud{
    display:flex;
    flex-wrap:wrap;
    gap:10px 16px;
    align-items:center;
    margin-top:10px;
    color:var(--muted);
  }
  #feedback{
    margin-top:12px;
    padding:10px 12px;
    background:rgba(37,99,235,0.1);
    border:1px dashed var(--border);
    border-radius:10px;
  }

  footer{
    border-top:1px solid var(--border);
    margin-top:28px;
    padding:16px;
    color:var(--muted);
  }
  /* === end v1.4 UI polish === */

  .visually-hidden{position:absolute!important;width:1px;height:1px;margin:-1px;border:0;padding:0;white-space:nowrap;clip-path:inset(100%);clip:rect(0 0 0 0);overflow:hidden}

  /* === v1.5: lock #choices to 2→3→4 columns (mobile-first) === */
  #choices {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  @media (min-width: 600px) {
    #choices { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 900px) {
    #choices { grid-template-columns: repeat(4, 1fr); }
  }
  /* === end v1.5 fixed columns === */


  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }


  /* History view polish */
  #history-list { list-style: none; padding: 0; margin: var(--space-2) 0; display: grid; gap: var(--space-2); }
  #history-list li {
    list-style: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-1);
    padding: var(--space-2) var(--space-3);
  }
  #history-list li:hover { box-shadow: var(--shadow-1); }
  /* Subtle stripes */
  #history-list li:nth-child(odd) { background: rgba(255,255,255,0.03); }
  @media (prefers-color-scheme: light) {
    #history-list li:nth-child(odd) { background: rgba(0,0,0,0.02); }
  }

  /* Opt-in theme override via attribute; no behavior change unless data-theme is set */
  :root[data-theme="dark"] {
    --bg: #0b0c10;
    --panel: #111318;
    --text: #e5e7eb;
    --muted: #a1a1aa;
    --border: #2b2f36;
    --accent: #2563eb;
    --accent-fg: #ffffff;
    --focus: #60a5fa;
  }
  :root[data-theme="light"] {
    --bg: #ffffff;
    --panel: #f9fafb;
    --text: #111827;
    --muted: #6b7280;
    --border: #d1d5db;
    --accent: #1d4ed8;
    --accent-fg: #ffffff;
    --focus: #1e40af;
  }

</style>

</main>

<!-- Only skip analytics/MC helper in Lighthouse audit runs (lhci=1).
E2E uses ?test=1, but should still load mc.js (logic helpers live there). -->
<script>
  (function () {
    // Only skip analytics/MC helper in Lighthouse audit runs (lhci=1).
    // E2E uses ?test=1, but should still load mc.js (logic helpers live there).
    if (!location.search.includes('lhci=1')) {
      var s = document.createElement('script');
      s.src = '../mc.js';
      s.async = true; // analyticsは asyncで十分
      document.head.appendChild(s);
    }
  })();
  // app entry
</script>
<script src="./boot-params.js"></script>
<script src="app.js" type="module"></script>
  <!-- デイリーモード時の共有URL上書き（/daily/YYYY-MM-DD.html をコピー） -->
  <script src="./share_patch.js"></script>
</body>
</html>
