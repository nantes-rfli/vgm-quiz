name: authoring (schema check)

on:
  workflow_dispatch: {}
  pull_request:
    branches: [ main ]

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare today's artifact (Finalize → Validate → Export slim)
        env:
          EXPORT_SLIM_SCAN_DAYS: "7"
        run: |
          set -euxo pipefail
          # Ensure build dir exists
          mkdir -p build
          # Run the same sequence as daily pipeline (safe to run; no commit)
          echo "[authoring] using input: public/app/daily_auto.json"
          node scripts/finalize_daily_v1.mjs --in public/app/daily_auto.json || true
          node scripts/ensure_min_items_v1_post.mjs --in public/app/daily_auto.json || true
          node scripts/validate_nonempty_today.mjs --in public/app/daily_auto.json || true
          node scripts/difficulty_v1_post.mjs --in public/app/daily_auto.json || true
          node scripts/distractors_v1_post.mjs --in public/app/daily_auto.json || true
          # Export (strict; stub-on-empty allowed)
          EXPORT_SLIM_STUB_ON_EMPTY=true node scripts/export_today_slim.mjs --in public/app/daily_auto.json
          # Assert artifact exists AND has a non-empty item with minimal fields
          node -e "const fs=require('fs'); const p='build/daily_today.json'; const j=JSON.parse(fs.readFileSync(p,'utf-8')); if(!j.item||!j.item.title||!j.item.game||!(j.item.media&&j.item.media.provider&&j.item.media.id)&&!(j.item.answers&&j.item.answers.canonical)){ console.error('::error:: build/daily_today.json.item is invalid'); process.exit(1); }"
          echo "[authoring] OK: build/daily_today.json and .md are ready"

      - name: Upload authoring artifacts
        uses: actions/upload-artifact@v4
        with:
          name: authoring-daily-today
          path: |
            build/daily_today.json
            build/daily_today.md

      - name: Schema validation (strict)
        env:
          SCHEMA_CHECK_DEBUG: "true"
        run: |
          node --version
          SCHEMA_CHECK_STRICT=true node scripts/validate_authoring_schema.mjs
        # v1.8: strict mode (fail-fast)

      - name: KPI summary (authoring today)
        run: node scripts/kpi/append_summary_authoring_today.mjs --in build/daily_today.json

      - name: Summary
        run: |
          echo "### Authoring schema check (strict)" >> $GITHUB_STEP_SUMMARY
          echo "- scripts/validate_authoring_schema.mjs ran with SCHEMA_CHECK_STRICT=true" >> $GITHUB_STEP_SUMMARY
          echo "- Violations will fail the job" >> $GITHUB_STEP_SUMMARY
