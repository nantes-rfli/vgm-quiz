name: Auto-fetch

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

concurrency:
  group: "autofetch"
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autofetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - name: Static guards (typos & legacy)
        run: |
          set -euo pipefail
          # Directories to scan
          DIRS="src test resources scripts"
          # 1) ban typo 'engest/'
          ! git grep -n "engest/" -- $DIRS || { echo "Typo 'engest/' found"; exit 1; }
          # 2) ban old normalizer ref
          ! git grep -n "ic/normalize-track" -- $DIRS || { echo "Use ingest/normalize-track instead of ic/normalize-track"; exit 1; }
          # 3) ban split-based CSV parsing (must use clojure.data.csv)
          ! git grep -nE 'string/split.+","' -- src || { echo "Legacy CSV parsing detected. Use clojure.data.csv"; exit 1; }
          # 4) enforce data.csv version via sentinel
          grep -q 'SENTINEL: data.csv-parser v1' src/vgm/import_csv.clj || { echo "import_csv.clj is not the data.csv version"; exit 1; }
      - name: Build dataset for tests
        run: |
          clojure -T:build clean || true
          clojure -T:build publish
          test -f public/build/dataset.json
      - name: Run tests
        run: clojure -M:test
      - name: Preflight require (cli + autofetch)
        run: clojure -M -e "(require 'vgm.autofetch 'vgm.cli 'vgm.ingest 'vgm.import-csv)"
      - name: Run autofetch
        run: clojure -M -m vgm.autofetch
      - name: Run stats
        run: |
          YEAR=$(clojure -M -m vgm.stats added-by-year || echo "Stats unavailable")
          echo "YEAR<<'EOF'" >> $GITHUB_ENV
          echo "$YEAR" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          COMP=$(clojure -M -m vgm.stats added-by-composer || echo "Stats unavailable")
          echo "COMP<<'EOF'" >> $GITHUB_ENV
          echo "$COMP" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Ingest candidates
        run: clojure -M -m vgm.cli ingest
      - name: Create PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "bot/ingest-${{ github.run_id }}"
          title: "Data ingest: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'scheduled' }} run"
          commit-message: "chore(data): ingest candidates + normalize + dedupe"
          body: |
            ### Summary
            - Ingested candidates and merged into `resources/data/tracks.edn`
            - Please review stats below. CI will validate schema and IDs.

            ### Stats (preview)
            #### Added by year
            ${{ env.YEAR }}

            #### Added by composer
            ${{ env.COMP }}
          labels: data, bot
          delete-branch: true
      - name: Enable auto-merge (squash)
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
