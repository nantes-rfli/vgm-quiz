name: Auto-fetch

on:
  schedule:
    - cron: "30 19 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  autofetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - name: Guard parser implementation (sentinel & no split-based csv)
        run: |
          grep -q 'SENTINEL: data.csv-parser v1' src/vgm/import_csv.clj
          ! grep -R 'string/split.*","' -n src || (echo "Old parser detected"; exit 1)
      - name: Build dataset for tests
        run: |
          clojure -T:build clean || true
          clojure -T:build publish
          test -f public/build/dataset.json
      - name: Run tests
        run: clojure -M:test
      - name: Preflight require (autofetch)
        run: clojure -M -e "(require 'vgm.autofetch 'vgm.ingest 'vgm.import-csv)"
      - name: Run autofetch
        run: clojure -M -m vgm.autofetch
      - name: Ingest candidates
        run: clojure -M -m vgm.cli ingest
      - name: Create PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "bot/ingest-${{ github.run_id }}"
          title: "Data ingest: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'scheduled' }} run"
          commit-message: "chore(data): ingest candidates + normalize + dedupe"
          body: |
            ### Summary
            - Ingested candidates and merged into `resources/data/tracks.edn`
            - Please review stats below. CI will validate schema and IDs.

            ### Stats (preview)
            ```
            $ clojure -M -m vgm.stats added-by-year
            $ clojure -M -m vgm.stats added-by-composer
            ```
          labels: data, bot
          delete-branch: true
      - name: Enable auto-merge (squash)
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
