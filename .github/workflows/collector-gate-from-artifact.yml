name: collector (gate from artifact)

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: 'Run ID of the discovery dry-run workflow'
        required: true
        type: string
      artifact_name:
        description: 'Artifact name (default: discovery-proposals)'
        required: false
        default: 'discovery-proposals'
      artifact_glob:
        description: 'Glob to locate proposals inside artifact (default: proposals-*.jsonl)'
        required: false
        default: 'proposals-*.jsonl'
      threshold:
        description: 'Gate threshold θ (e.g., 0.72). Empty = dry-run only.'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (do not write candidates or PR). true/false'
        required: false
        default: 'true'

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download proposals artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.artifact_run_id }}
          name: ${{ inputs.artifact_name }}
          path: downloads

      - name: Resolve proposals path
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          file=$(ls downloads/${{ inputs.artifact_glob }} 2>/dev/null | head -n 1 || true)
          if [ -z "$file" ]; then
            echo '::error::No proposals found in downloaded artifact.'
            exit 1
          fi
          echo "proposals=$file" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply gate
        env:
          GATE_PROPOSALS: ${{ steps.resolve.outputs.proposals }}
          COLLECTOR_GATE_THRESHOLD: ${{ inputs.threshold }}
          GATE_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          node scripts/collector/gate_apply_v1.mjs

      - name: Create PR (queued + auto) if not dry-run and threshold set
        if: ${{ inputs.dry_run != 'true' && inputs.threshold != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "collector: gate decisions (θ=${{ inputs.threshold }})"
          title: "Collector Gate (artifact): decisions (θ=${{ inputs.threshold }})"
          body: |
            This PR contains auto-accepted and queued candidates generated by the collector gate.
            - artifact_run_id: `${{ inputs.artifact_run_id }}`
            - threshold: `${{ inputs.threshold }}`
            - dry-run: `${{ inputs.dry_run }}`
          branch: "collector/gate-artifact/${{ github.run_id }}"
          delete-branch: true
          labels: |
            queue:collector
            docs:skip
          add-paths: |
            resources/candidates/auto/*
            resources/candidates/queue/*

      - name: Summary
        run: echo "### collector (gate from artifact) finished" >> "$GITHUB_STEP_SUMMARY"
