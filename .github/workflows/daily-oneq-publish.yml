name: daily (oneq publish)
on:
  workflow_dispatch: {}
  schedule:
    - cron: "5 0 * * *" # 09:05 JST (UTC+9)

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute date (UTC)
        id: date
        run: echo "ONEQ_DATE=$(date -u +%F)" >> $GITHUB_ENV

      - name: Generate daily & update lock
        run: node script/oneq_publish.mjs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oneq-publish-${{ env.ONEQ_DATE }}
          path: |
            public/daily/
            docs/data/daily_lock.json

      - name: Write KPI summary
        run: |
          node script/oneq_summary.mjs

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          # Prefer DAILY_PR_PAT, fall back to CPR_PAT
          token: ${{ secrets.DAILY_PR_PAT || secrets.CPR_PAT }}
          commit-message: "chore(oneq): ${{ env.ONEQ_DATE }} daily question"
          title: "chore(oneq): ${{ env.ONEQ_DATE }} daily question"
          body: |
            Auto-generated daily question for ${{ env.ONEQ_DATE }}.
            - Source: docs/data/media_map.json
            - Embedding-only policy
          branch: chore/oneq-${{ env.ONEQ_DATE }}
          add-paths: |
            public/daily/${{ env.ONEQ_DATE }}*.json
            docs/data/daily_lock.json
          signoff: true
          delete-branch: true

      - name: Enable PR auto-merge (squash)
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.DAILY_PR_PAT || secrets.CPR_PAT }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: SQUASH

