name: issues (export)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 15 * * *" # ≒ JST 00:00

permissions:
  contents: write
  issues: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Export issues snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node script/export_issues.mjs
      - name: Create PR with snapshot (branch chore/issues-export)
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs(issues): export snapshot"
          title: "docs(issues): export snapshot"
          body: "Automated export by issues-export workflow"
          branch: chore/issues-export
          delete-branch: true
          add-paths: |
            docs/issues/STATE.md
            docs/issues/state.json
