name: collector (gate from artifact v2)

permissions:
  actions: read
  contents: read

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: 'Run ID of the discovery dry-run workflow'
        required: true
        type: string
      artifact_name:
        description: 'Preferred artifact name (default: discovery-proposals). Leave empty to auto-select.'
        required: false
        default: 'discovery-proposals'
      artifact_glob:
        description: 'Glob to locate proposals inside artifact (default: proposals-*.jsonl)'
        required: false
        default: 'proposals-*.jsonl'
      threshold:
        description: 'Gate threshold θ (e.g., 0.72). Empty = dry-run only.'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (do not write candidates or PR). true/false'
        required: false
        default: 'true'

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List artifacts of the run
        id: list
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = core.getInput('artifact_run_id');
            const {owner, repo} = context.repo;
            const res = await github.rest.actions.listWorkflowRunArtifacts({owner, repo, run_id});
            const arts = res.data.artifacts;
            const names = arts.map(a => a.name);
            core.info('Artifacts: ' + JSON.stringify(names));
            const preferred = core.getInput('artifact_name') || 'discovery-proposals';
            let chosen = names.includes(preferred) ? preferred : '';
            if (!chosen) {
              // fallback: pick one that includes 'proposals'
              const cand = names.find(n => /proposals/i.test(n));
              if (cand) chosen = cand;
            }
            core.setOutput('chosen', chosen);
            core.setOutput('count', String(names.length));

      - name: Download by chosen name
        if: ${{ steps.list.outputs.chosen != '' }}
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.artifact_run_id }}
          name: ${{ steps.list.outputs.chosen }}
          path: downloads

      - name: Download all (fallback)
        if: ${{ steps.list.outputs.chosen == '' }}
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.artifact_run_id }}
          pattern: '*'
          merge-multiple: true
          path: downloads

      - name: Resolve proposals path
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          file=$(ls downloads/**/${{ inputs.artifact_glob }} 2>/dev/null | head -n 1 || true)
          if [ -z "$file" ]; then
            echo '::error::No proposals found in downloaded artifact(s).'
            echo 'Downloaded artifacts:'
            ls -R downloads || true
            exit 1
          fi
          echo "proposals=$file" >> "$GITHUB_OUTPUT"
          echo "Found proposals at: $file"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply gate
        env:
          GATE_PROPOSALS: ${{ steps.resolve.outputs.proposals }}
          COLLECTOR_GATE_THRESHOLD: ${{ inputs.threshold }}
          GATE_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          node scripts/collector/gate_apply_v1.mjs

      - name: Create PR (queued + auto) if not dry-run and threshold set
        if: ${{ inputs.dry_run != 'true' && inputs.threshold != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "collector: gate decisions (θ=${{ inputs.threshold }})"
          title: "Collector Gate (artifact v2): decisions (θ=${{ inputs.threshold }})"
          body: |
            This PR contains auto-accepted and queued candidates generated by the collector gate.
            - artifact_run_id: `${{ inputs.artifact_run_id }}`
            - threshold: `${{ inputs.threshold }}`
            - dry_run: `${{ inputs.dry_run }}`
          branch: "collector/gate-artifact-v2/${{ github.run_id }}"
          delete-branch: true
          labels: |
            queue:collector
            docs:skip
          add-paths: |
            resources/candidates/auto/*
            resources/candidates/queue/*

      - name: Summary
        run: |
          echo "### collector (gate from artifact v2) finished" >> "$GITHUB_STEP_SUMMARY"
