name: smoke apple override
on:
  workflow_dispatch:
    inputs:
      key:
        description: '正規化キー (例: "chrono trigger__corridors of time")'
        required: false
        default: ""
      title:
        description: 'タイトル（key未指定時に使用）'
        required: false
        default: ""
      game:
        description: 'ゲーム名（key未指定時に使用）'
        required: false
        default: ""
      composer:
        description: '作曲者（任意）'
        required: false
        default: ""
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve default key (empty input)
        id: resolve
        run: |
          KEY_IN="${{ github.event.inputs.key }}"
          TITLE_IN="${{ github.event.inputs.title }}"
          GAME_IN="${{ github.event.inputs.game }}"
          if [ -z "$KEY_IN" ] && [ -z "$TITLE_IN" ] && [ -z "$GAME_IN" ]; then
            # Pick the first key in data/apple_overrides.jsonc as a sensible default smoke target
            node - <<'NODE'
            const fs = require('fs');
            const out = process.env.GITHUB_OUTPUT;
            let key = '';
            try {
              let raw = fs.readFileSync('data/apple_overrides.jsonc','utf8');
              raw = raw
                .replace(/\/\*(?:.|\n|\r)*?\*\//g, '')
                .replace(/(^|\s+)\/\/.*$/gm, '');
              const obj = JSON.parse(raw);
              key = Object.keys(obj)[0] || '';
            } catch (e) {}
            if (out) fs.appendFileSync(out, `key=${key}\n`);
            console.log(key ? `[smoke] default key -> ${key}` : '[smoke] default key not found');
            NODE
          else
            echo "key=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run smoke script
        run: |
          KEY="${{ steps.resolve.outputs.key }}"
          if [ -z "$KEY" ]; then KEY="${{ github.event.inputs.key }}"; fi
          TITLE="${{ github.event.inputs.title }}"
          GAME="${{ github.event.inputs.game }}"
          COMP="${{ github.event.inputs.composer }}"
          if [ -n "$KEY" ]; then
            node scripts/smoke_apple_override.mjs --key "$KEY" ${COMP:+--composer "$COMP"}
          else
            node scripts/smoke_apple_override.mjs --title "$TITLE" --game "$GAME" ${COMP:+--composer "$COMP"}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke_daily_today
          path: build/daily_today.*
          if-no-files-found: error
