name: collector (gate from artifact by id - REST)

permissions:
  actions: read
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: 'Run ID of the discovery dry-run workflow (e.g., 17580132609)'
        required: true
        type: string
      artifact_glob:
        description: 'Glob to locate proposals inside artifact (default: proposals-*.jsonl)'
        required: false
        default: 'proposals-*.jsonl'
      threshold:
        description: 'Gate threshold θ (e.g., 0.72). Empty = dry-run only.'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (do not write candidates or PR). true/false'
        required: false
        default: 'true'

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List artifacts and pick id
        id: list
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ inputs.artifact_run_id }}
        with:
          script: |
            const run_id_raw = process.env.RUN_ID || (context.payload?.inputs?.artifact_run_id ?? '');
            if (!run_id_raw) core.setFailed('artifact_run_id is empty.');
            const run_id = Number(run_id_raw);
            if (!Number.isFinite(run_id)) core.setFailed(`artifact_run_id is not a number: ${run_id_raw}`);
            const {owner, repo} = context.repo;
            const res = await github.rest.actions.listWorkflowRunArtifacts({owner, repo, run_id});
            const arts = res.data.artifacts || [];
            core.info('Artifacts: ' + JSON.stringify(arts.map(a=>({id:a.id,name:a.name}))));
            const preferred = arts.findLast?.(a => /proposals/i.test(a.name)) || arts.at(-1) || null;
            if (!preferred) core.setFailed('No artifacts found for the run.');
            core.setOutput('artifact_id', String(preferred.id));
            core.setOutput('artifact_name', preferred.name);

      - name: Download artifact via REST (by id)
        env:
          ART_ID: ${{ steps.list.outputs.artifact_id }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Downloading artifact id=${ART_ID} from ${REPO} via REST..."
          curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -o artifact.zip             "https://api.github.com/repos/${REPO}/actions/artifacts/${ART_ID}/zip"
          mkdir -p downloads
          unzip -o artifact.zip -d downloads >/dev/null
          echo "Unzipped into ./downloads"
          ls -R downloads || true

      - name: Resolve proposals path
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          echo "Chosen artifact: ${{ steps.list.outputs.artifact_name }} (id=${{ steps.list.outputs.artifact_id }})"
          file=$(ls downloads/**/${{ inputs.artifact_glob }} 2>/dev/null | head -n 1 || true)
          if [ -z "$file" ]; then
            file=$(ls downloads/${{ inputs.artifact_glob }} 2>/dev/null | head -n 1 || true)
          fi
          if [ -z "$file" ]; then
            echo '::error::No proposals found in downloaded artifact.'
            exit 1
          fi
          echo "proposals=$file" >> "$GITHUB_OUTPUT"
          echo "Found proposals at: $file"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply gate
        env:
          GATE_PROPOSALS: ${{ steps.resolve.outputs.proposals }}
          COLLECTOR_GATE_THRESHOLD: ${{ inputs.threshold }}
          GATE_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          node scripts/collector/gate_apply_v1.mjs

      - name: Stage candidate files
        if: ${{ inputs.dry_run != 'true' && inputs.threshold != '' }}
        run: |
          git status --porcelain
          git add -A resources/candidates || true
          echo 'Staged files:'
          git status --porcelain

      - name: Create PR (queued + auto) if not dry-run and threshold set
        if: ${{ inputs.dry_run != 'true' && inputs.threshold != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "collector: gate decisions (θ=${{ inputs.threshold }})"
          title: "Collector Gate (artifact by id - REST): decisions (θ=${{ inputs.threshold }})"
          body: |
            This PR contains auto-accepted and queued candidates generated by the collector gate.
            - artifact_run_id: `${{ inputs.artifact_run_id }}`
            - artifact_name: `${{ steps.list.outputs.artifact_name }}`
            - threshold: `${{ inputs.threshold }}`
            - dry_run: `${{ inputs.dry_run }}`
          branch: "collector/gate-artifact-id-rest/${{ github.run_id }}"
          delete-branch: true
          labels: |
            queue:collector
            docs:skip
          add-paths: |
            resources/candidates/**

      - name: Summary
        run: echo "### collector (gate from artifact by id - REST) finished" >> "$GITHUB_STEP_SUMMARY"

