name: Pages

on:
  # 通常ルート: main に入れば必ず実行
  push:
    branches: [ main ]
  # 保険ルート: CI Fast が成功で完了したら実行（重複は concurrency で抑止）
  workflow_run:
    workflows: [ "CI Fast" ]
    types:
      - completed
  # 手動で再デプロイできるように
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print context (debug)
        run: |
          echo "event_name=$GITHUB_EVENT_NAME"
          echo "ref=$GITHUB_REF  sha=$GITHUB_SHA"
          echo "run_id=$GITHUB_RUN_ID  repo=$GITHUB_REPOSITORY"
          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            echo "Triggered by workflow_run (likely CI Fast completion)."
            # 成功時のみ実行する（保険トリガーの誤発動防止）
            # workflow_runのpayloadはgithub.event.workflow_run.conclusionに入る
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "Upstream workflow not successful; exiting without deploy."
              exit 1
            fi
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Clean
        run: clojure -T:build clean || true

      - name: Check root redirect
        run: grep -q "location.replace('./app/')" public/index.html

      - name: Publish
        run: clojure -T:build publish

      - name: Generate build metadata
        run: |
          commit=$(git rev-parse HEAD)
          short_sha=$(git rev-parse --short HEAD)
          branch="${GITHUB_REF_NAME}"
          built_at=$(date --iso-8601=seconds)
          ci_run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          mkdir -p public
          cat <<EOF2 > public/build.json
          {
            "commit": "${commit}",
            "short_sha": "${short_sha}",
            "branch": "${branch}",
            "built_at": "${built_at}",
            "ci_run_url": "${ci_run_url}"
          }
          EOF2
          mkdir -p public/app
          cp public/build.json public/app/build.json

      - name: Final guard (must have build.json)
        run: |
          test -f public/build.json
          test -f public/app/build.json

      # Contract checks have moved to CI Fast; this workflow handles deploy only.

      - name: Ensure .nojekyll
        run: |
          touch public/.nojekyll
      - name: Upload artifact (entire public)
        uses: actions/upload-pages-artifact@v3
        with:
          # /app だけでなく /daily や /ogp も含めて配信
          path: public

  deploy:
    # PR ではデプロイしない（build チェックだけにする）
    if: ${{ github.event_name != 'pull_request' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
