name: daily (oneq preview)
on:
  workflow_dispatch: {}

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate preview daily JSON
        run: |
          node script/oneq_preview.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-preview
          path: out/
