name: link-check (docs)

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - '**/*.md'
      - '.lychee.toml'
  schedule:
    - cron: '15 20 * * 0' # weekly, UTC 20:15 ≒ JST 05:15 Mon

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lychee
        uses: lycheeverse/lychee-action@v1.10.0
        with:
          args: --config .lychee.toml --verbose './**/*.md'

      - name: Summarize
        if: always()
        run: |
          echo "## link-check summary" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "- status: ✅ success" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- status: ❌ failure (see logs)" >> "$GITHUB_STEP_SUMMARY"
          fi
