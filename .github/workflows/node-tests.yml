name: node-tests (v1.12)

on:
  push:
    paths:
      - 'scripts/lib/**'
      - 'scripts/config/**'
      - 'scripts/**/__tests__/**'
      - '.github/workflows/node-tests.yml'
  pull_request:
    paths:
      - 'scripts/lib/**'
      - 'scripts/config/**'
      - 'scripts/**/__tests__/**'
      - '.github/workflows/node-tests.yml'
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run unit tests
        run: |
          node --test "scripts/**/__tests__/*.mjs"
