name: collector (gate)

on:
  workflow_dispatch:
    inputs:
      proposals_path:
        description: 'Path to proposals JSONL (artifact path or repo path)'
        required: true
        type: string
      threshold:
        description: 'Gate threshold θ (e.g., 0.72). Empty = dry-run only.'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (do not write candidates or PR). true/false'
        required: false
        default: 'true'

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply gate
        env:
          GATE_PROPOSALS: ${{ inputs.proposals_path }}
          COLLECTOR_GATE_THRESHOLD: ${{ inputs.threshold }}
          GATE_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          node scripts/collector/gate_apply_v1.mjs

      - name: Create PR (queued + auto) if not dry-run and threshold set
        if: ${{ inputs.dry_run != 'true' && inputs.threshold != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "collector: gate decisions (θ=${{ inputs.threshold }})"
          title: "Collector Gate: decisions (θ=${{ inputs.threshold }})"
          body: |
            This PR contains auto-accepted and queued candidates generated by the collector gate.
            - proposals: `${{ inputs.proposals_path }}`
            - threshold: `${{ inputs.threshold }}`
            - dry-run: `${{ inputs.dry_run }}`
          branch: "collector/gate/${{ github.run_id }}"
          delete-branch: true
          labels: |
            queue:collector
            docs:skip
          add-paths: |
            resources/candidates/auto/*
            resources/candidates/queue/*

      - name: Summary
        run: echo "### collector (gate) finished" >> "$GITHUB_STEP_SUMMARY"

