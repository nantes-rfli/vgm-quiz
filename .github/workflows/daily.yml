name: daily.json generator (JST)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 15 * * *"   # 00:00 JST

jobs:
  generate-daily:
    name: daily-generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate DAILY_PR_PAT token
        env:
          DAILY_PR_PAT: ${{ secrets.DAILY_PR_PAT }}
        run: |
          if [ -z "${DAILY_PR_PAT}" ]; then
            echo "::error title=Missing DAILY_PR_PAT::The DAILY_PR_PAT secret is empty or not configured. Create a fine-grained PAT (repo:contents write, pull_requests write) and add it as a repository secret."
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${DAILY_PR_PAT}" https://api.github.com/user)
          if [ "$code" -ne 200 ]; then
            echo "::error title=Invalid/expired DAILY_PR_PAT::GitHub API /user returned HTTP ${code}. The token may be expired or lacks scopes. Re-issue the PAT and update the secret."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Generate public/app/daily.json (JST)
        env:
          DATASET_URL: https://nantes-rfli.github.io/vgm-quiz/build/dataset.json
          OUTPUT_PATH: public/app/daily.json
          TZ: Asia/Tokyo
        run: node scripts/generate_daily.js

      - name: Derive OGP subtitle into daily.json
        run: |
          node scripts/derive_daily_meta.js

      - name: Prepare Playwright for OGP
        run: |
          set -eux
          npm init -y
          npm i -D playwright
          npx playwright install --with-deps

      - name: Generate OGP card (1200x630)
        env:
          DAILY_DATE: ""
          OGP_SUBTITLE: "title→game"
        run: |
          node scripts/generate_ogp.js
          ls -lah public/ogp || true

      - name: Cleanup legacy JP-named OGP files (once)
        run: |
          set -eux
          mkdir -p public/ogp
          # "年" を含む誤命名ファイルを削除（過去の誤作成ぶんも除去）
          find public/ogp -maxdepth 1 -type f -name 'daily-*年*' -delete || true

      - name: Compute PUBLIC_BASE for GitHub Pages
        run: |
          set -eux
          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          echo "PUBLIC_BASE=https://${owner}.github.io/${repo}" >> $GITHUB_ENV

      - name: Generate Daily share page
        env:
          DAILY_DATE: ""
          PUBLIC_BASE: ${{ env.PUBLIC_BASE }}
          OGP_SUBTITLE: "title→game"
        run: |
          node scripts/generate_share_page.js
          ls -lah public/daily || true

      - name: Generate Daily index & latest
        run: |
          node scripts/generate_daily_index.js
          ls -lah public/daily || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DAILY_PR_PAT }}
          branch: bot/daily
          commit-message: "chore(daily): update daily.json (JST), OGP, and share page"
          title: "chore(daily): update daily.json (JST), OGP, and share page"
          add-paths: |
            public/app/daily.json
            public/ogp/*.png
            public/daily/*.html
          delete-branch: true
          signoff: true
          labels: "automation,daily"
