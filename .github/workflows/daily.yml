name: daily.json generator (JST)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 15 * * *"   # 00:00 JST

jobs:
  generate-daily:
    name: daily-generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate DAILY_PR_PAT token
        env:
          DAILY_PR_PAT: ${{ secrets.DAILY_PR_PAT }}
        run: |
          if [ -z "${DAILY_PR_PAT}" ]; then
            echo "::error title=Missing DAILY_PR_PAT::The DAILY_PR_PAT secret is empty or not configured. Create a fine-grained PAT (repo:contents write, pull_requests write) and add it as a repository secret."
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${DAILY_PR_PAT}" https://api.github.com/user)
          if [ "$code" -ne 200 ]; then
            echo "::error title=Invalid/expired DAILY_PR_PAT::GitHub API /user returned HTTP ${code}. The token may be expired or lacks scopes. Re-issue the PAT and update the secret."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Generate public/app/daily.json (JST)
        env:
          DATASET_URL: https://nantes-rfli.github.io/vgm-quiz/build/dataset.json
          OUTPUT_PATH: public/app/daily.json
          TZ: Asia/Tokyo
        run: node scripts/generate_daily.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DAILY_PR_PAT }}
          branch: bot/daily
          commit-message: "chore(daily): update daily.json"
          title: "chore(daily): update daily.json"
          add-paths: |
            public/app/daily.json
          delete-branch: true
          signoff: true
          labels: "automation,daily"
