name: candidates (harvest)

on:
  workflow_dispatch: {}

jobs:
  harvest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build dataset (clojure -T:build publish)
        run: clojure -T:build publish

      - name: Harvest from dataset
        run: node scripts/harvest_candidates.js --out public/app/daily_candidates.jsonl

      - name: Summary details (polish)
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const f='public/app/daily_candidates.jsonl';
          const lines = fs.existsSync(f) ? fs.readFileSync(f,'utf-8').trim().split(/\n+/) : [];
          const N = lines.length;
          const s = ['### candidates (harvest) details','- count: **'+N+'**'];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, s.join('\n')+'\n');
          NODE

      - name: Compute Notability v1 (score + band)
        run: node scripts/notability_v1.mjs

      - name: Upload candidates artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-candidates
          path: public/app/daily_candidates.jsonl

      - name: KPI summary (candidates, pre-dedup)
        run: node scripts/kpi/append_summary_candidates.mjs --in public/app/daily_candidates.jsonl --label "pre-dedup"

      - name: Summary (result)
        run: echo "### candidates (harvest) result" >> "$GITHUB_STEP_SUMMARY"
