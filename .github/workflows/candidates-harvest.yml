name: candidates (harvest)

on:
  workflow_dispatch:
    inputs:
      dedup_fail_threshold:
        description: 'Optional de-dup θ gate (e.g., 0.88). Empty to disable.'
        required: false
        default: ''

jobs:
  harvest:
    runs-on: ubuntu-latest
    env:
      # 任意: θのゲート（例: 0.85）。空ならスキップ。
      DEDUP_FAIL_THRESHOLD: ${{ inputs.dedup_fail_threshold }}
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build dataset (clojure -T:build publish)
        run: clojure -T:build publish

      - name: Harvest from dataset
        run: node scripts/harvest_candidates.js --out public/app/daily_candidates.jsonl

      - name: Summary details (polish)
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const f='public/app/daily_candidates.jsonl';
          const lines = fs.existsSync(f) ? fs.readFileSync(f,'utf-8').trim().split(/\n+/) : [];
          const N = lines.length;
          const s = ['### candidates (harvest) details','- count: **'+N+'**'];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, s.join('\n')+'\n');
          NODE

      - name: Compute Notability v1 (score + band)
        run: node scripts/notability_v1.mjs

      - name: Provenance fallback (candidates)
        run: node scripts/provenance_fallbacks_v1.mjs --jsonl public/app/daily_candidates.jsonl

      - name: Upload candidates artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-candidates
          path: public/app/daily_candidates.jsonl

      - name: Append KPI (provenance, candidates)
        run: node scripts/kpi/append_summary_provenance.mjs --jsonl public/app/daily_candidates.jsonl

      - name: Append KPI (dedup v1.5 preview)
        run: node scripts/kpi/append_summary_dedup_ngram_v1_5.mjs --in public/app/daily_candidates.jsonl --thresholds "0.7,0.8,0.9"

      - name: Gate (dedup v1.5, optional)
        if: ${{ env.DEDUP_FAIL_THRESHOLD != '' }}
        run: node scripts/guards/dedup_ngram_gate_v1_5.mjs --in public/app/daily_candidates.jsonl --fail-threshold "${{ env.DEDUP_FAIL_THRESHOLD }}"

      - name: KPI summary (candidates, pre-dedup)
        run: node scripts/kpi/append_summary_candidates.mjs --in public/app/daily_candidates.jsonl --label "pre-dedup"

      - name: Gate threshold summary
        run: |
          echo "### de-dup gate (v1.5)" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${DEDUP_FAIL_THRESHOLD}" ]; then
            echo "- threshold: ${DEDUP_FAIL_THRESHOLD}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- threshold: (disabled)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summary (result)
        run: echo "### candidates (harvest) result" >> "$GITHUB_STEP_SUMMARY"
