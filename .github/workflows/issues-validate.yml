name: issues (validate)

on:
  pull_request:
    paths:
      - 'docs/issues/*.json'
      - 'script/validate_issue_specs.mjs'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate docs/issues/*.json
        run: node script/validate_issue_specs.mjs

