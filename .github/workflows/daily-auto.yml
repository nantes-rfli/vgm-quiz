name: daily (auto, candidates→score→generate)

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Default = today (JST).'
        required: false
        type: string
      with_choices:
        description: 'Attach multiple-choice distractors (composer/game) to output'
        required: false
        type: boolean
      apply_to_main:
        description: 'Create PR to update public/app/daily_auto.json'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build dataset (clojure -T:build publish)
        run: clojure -T:build publish

      - name: Step 1/3 harvest
        run: node scripts/harvest_candidates.js --out public/app/daily_candidates.jsonl

      - name: Step 2/3 score
        run: node scripts/score_candidates.js --in public/app/daily_candidates.jsonl --out public/app/daily_candidates_scored.jsonl

      - name: Step 2.5 enrich media start
        run: node scripts/enrich_media_start.js --in public/app/daily_candidates_scored.jsonl --out public/app/daily_candidates_scored_enriched.jsonl

      - name: Step 3/3 generate (for date)
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then DATE="$(TZ=Asia/Tokyo date +%F)"; fi
          WITH_CHOICES="${{ github.event.inputs.with_choices }}"
          EXTRA=""
          if [ "$WITH_CHOICES" = "true" ]; then
            EXTRA="--with-choices"
          fi
          echo "with_choices=$WITH_CHOICES (extra flag: $EXTRA)"
          node scripts/generate_daily_from_candidates.js --in public/app/daily_candidates_scored_enriched.jsonl --date "$DATE" --out public/app/daily_auto.json $EXTRA

      - name: Upload artifact (daily_auto.json)
        uses: actions/upload-artifact@v4
        with:
          name: daily-auto-json
          path: public/app/daily_auto.json

      - name: Summary details
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const TZ = 'Asia/Tokyo';
          const raw = fs.readFileSync('public/app/daily_auto.json','utf-8');
          const j = JSON.parse(raw);
          const by = j.by_date || {};
          function todayJST(){
            try {
              return new Date(new Date().toLocaleString('en-US', { timeZone: TZ })).toISOString().slice(0,10);
            } catch {
              const d = new Date();
              return new Date(d.getTime()+9*3600*1000).toISOString().slice(0,10);
            }
          }
          const inp = (process.env.INPUT_DATE||'').trim();
          const date = (/^\d{4}-\d{2}-\d{2}$/.test(inp) ? inp : todayJST());
          const v = by[date];
          const lines = ['### daily (auto) details', `- date: **${date}**`];
          if (v){
            lines.push(`- pick: ${v.title} / ${v.game} / ${v.composer} (diff=${v.difficulty ?? 'n/a'})`);
            const comp = (v.choices && Array.isArray(v.choices.composer)) ? v.choices.composer : [];
            const game = (v.choices && Array.isArray(v.choices.game)) ? v.choices.game : [];
            const avail = comp.length>0 || game.length>0;
            lines.push(`- choices_override: ${avail ? '**available**' : 'none'}`);
            if (avail) lines.push(`- choices: composer[${comp.join(', ')}], game[${game.join(', ')}]`);
          } else {
            lines.push(`- pick: (no entry for this date)`);
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n')+'\n');
          NODE

      - name: Create PR (optional)
        if: ${{ github.event.inputs.apply_to_main == 'true' }}
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DAILY_PR_PAT }}
          commit-message: "chore(daily-auto): update daily_auto.json"
          title: "chore(daily-auto): update daily_auto.json"
          body: |
            Auto pipeline (harvest→score→generate) for ${{ github.event.inputs.date || '(today JST)' }}.

            - Writes `public/app/daily_auto.json` (separate from existing daily.json)
            - 30-day dedup within the auto file

            Default-off; merging does not affect current daily.json pipeline.
          add-paths: |
            public/app/daily_auto.json
          branch: chore/daily-auto
          delete-branch: true
          author: GitHub Actions <actions@github.com>

      - name: Enable auto-merge (squash)
        if: ${{ github.event.inputs.apply_to_main == 'true' && steps.cpr.outputs.pull-request-number }}
        uses: peter-evans/enable-pull-request-automerge@v3
        continue-on-error: true
        with:
          token: ${{ secrets.DAILY_PR_PAT }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      - name: Summary
        run: |
          {
            echo "### daily (auto) result";
            echo "- date: ${{ github.event.inputs.date || 'today (JST)' }}";
            if [ "${{ github.event.inputs.apply_to_main }}" = "true" ]; then
              echo "- mode: PR (chore/daily-auto)";
            else
              echo "- mode: artifact only (daily-auto-json)";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
