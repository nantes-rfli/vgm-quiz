name: lighthouse (nightly)

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  schedule:
    - cron: "10 18 * * *" # UTC 18:10 ≒ JST 03:10

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Chrome for headless Lighthouse
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Lighthouse CI
        run: |
          npm i -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI (with budgets & asserts)
        run: |
          lhci autorun \
            --config=tools/lighthouse/lighthouserc.ci.json \
            --collect.settings.budgetsPath=tools/lighthouse/budgets.json
