name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Ensure cache paths exist
        run: mkdir -p ~/.m2/repository ~/.gitlibs ~/.deps.clj .cpcache

      - name: Restore deps cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ runner.os }}-${{ hashFiles('**/deps.edn') }}
          restore-keys: cljdeps-

      - name: Download clj-kondo
        uses: robinraju/release-downloader@v1
        with:
          repository: clj-kondo/clj-kondo
          latest: true
          fileName: clj-kondo-linux-amd64.zip
          out-file-path: clj-kondo

      - name: Install clj-kondo
        run: |
          unzip -q clj-kondo/clj-kondo-linux-amd64.zip -d clj-kondo
          mkdir -p $HOME/.local/bin
          install -m 0755 clj-kondo/clj-kondo $HOME/.local/bin/clj-kondo
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: clj-kondo
        run: clj-kondo --lint src test build.clj || clj-kondo --version

      - name: Build dataset/publish
        run: |
          clojure -T:build clean || true
          clojure -T:build publish

      - name: Tests (if any)
        run: |
          if [ -d test ]; then clojure -M:test; else echo "no tests"; fi

      - name: Web assets sanity
        run: |
          test -f public/index.html
          test -f public/app.js
          test -f public/sw.js || true
          test -f public/manifest.webmanifest || true

      - name: Save deps cache (main only)
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ runner.os }}-${{ hashFiles('**/deps.edn') }}
