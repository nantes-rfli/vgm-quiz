name: CI (legacy, manual)

on:
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          clj-kondo: latest

      - name: Ensure cache paths exist
        run: mkdir -p ~/.m2/repository ~/.gitlibs ~/.deps.clj .cpcache

      - name: Restore deps cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ runner.os }}-${{ hashFiles('**/deps.edn') }}
          restore-keys: cljdeps-

      - name: clj-kondo version
        run: clj-kondo --version

      - name: clj-kondo
        run: clj-kondo --lint src test build.clj || clj-kondo --version

      - name: Check for unresolved merge conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|=======$|>>>>>>> )' -- ':!public/build/*' ':!dist/*' ; then
            echo "Unresolved merge conflict markers found"; exit 1; fi

      - name: Static guards (typos & legacy)
        run: |
          set -euo pipefail
          # Directories to scan
          DIRS="src test resources scripts"
          # 1) ban typo 'engest/'
          ! git grep -n "engest/" -- $DIRS || { echo "Typo 'engest/' found"; exit 1; }
          # 2) ban old normalizer ref
          ! git grep -n "ic/normalize-track" -- $DIRS || { echo "Use ingest/normalize-track instead of ic/normalize-track"; exit 1; }
          # 3) ban split-based CSV parsing (must use clojure.data.csv)
          ! git grep -nE 'string/split.+","' -- src || { echo "Legacy CSV parsing detected. Use clojure.data.csv"; exit 1; }
          # 4) enforce data.csv version via sentinel
          grep -q 'SENTINEL: data.csv-parser v1' src/vgm/import_csv.clj || { echo "import_csv.clj is not the data.csv version"; exit 1; }

      - name: Preflight require (vgm.cli)
        run: clojure -M -e "(require 'vgm.cli 'vgm.ingest 'vgm.import-csv)"

      - name: Build dataset/publish
        run: |
          clojure -T:build clean || true
          clojure -T:build publish
      - name: Preflight require (aliases)
        run: clojure -M -e "(require 'vgm.aliases)"


      - name: Tests (if any)
        run: |
          if [ -d test ]; then clojure -M:test; else echo "no tests"; fi

      - name: Web assets sanity
        run: |
          set -euxo pipefail

          echo "== public listing =="
          ls -la public || (echo "missing public/ dir"; exit 1)

          # index.html can be at public/index.html or public/app/index.html
          if [ -f public/index.html ] || [ -f public/app/index.html ]; then
            echo "index.html OK"
          else
            echo "index.html missing (checked public/index.html and public/app/index.html)"
            exit 1
          fi

          # app.js can be at public/app.js or public/app/app.js
          if [ -f public/app.js ] || [ -f public/app/app.js ]; then
            echo "app.js OK"
          else
            echo "app.js missing (checked public/app.js and public/app/app.js)"
            exit 1
          fi

          # optional assets
          [ -f public/sw.js ] || true
          [ -f public/manifest.webmanifest ] || true

      - name: Save deps cache (main only)
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ runner.os }}-${{ hashFiles('**/deps.edn') }}

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: e2e-artifacts
          if-no-files-found: ignore
