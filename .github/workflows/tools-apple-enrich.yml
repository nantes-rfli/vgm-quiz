name: tools-apple-enrich

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine overrides file
        id: pick
        run: |
          set -e
          if [ -f "resources/data/apple_overrides.jsonc" ]; then
            echo "overrides=resources/data/apple_overrides.jsonc" >> "$GITHUB_OUTPUT"
          elif [ -f "data/apple_overrides.jsonc" ]; then
            echo "overrides=data/apple_overrides.jsonc" >> "$GITHUB_OUTPUT"
          else
            echo "overrides=" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Apple overrides (if present)
        if: ${{ steps.pick.outputs.overrides != '' }}
        run: |
          set -euxo pipefail
          echo "Using overrides: ${{ steps.pick.outputs.overrides }}"
          node scripts/enrich/apple_enrich.mjs build/dataset.json "${{ steps.pick.outputs.overrides }}" \
          --write build/dataset.json

      - name: Commit changes (if any)
        run: |
          set -euxo pipefail
          if ! git diff --quiet -- build/dataset.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add build/dataset.json
            git commit -m "chore(data): apply apple overrides"
            git push
          else
            echo "No changes to commit."
