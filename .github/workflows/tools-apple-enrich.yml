name: tools-apple-enrich

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java (for Clojure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@11.0
        with:
          cli: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dataset (EDN -> public/build/dataset.json)
        run: |
          clojure -T:build publish
          test -f public/build/dataset.json
          test -f public/build/version.json

      - name: Determine overrides file
        id: pick
        run: |
          if [ -f "resources/data/apple_overrides.jsonc" ]; then
            echo "overrides=resources/data/apple_overrides.jsonc" >> "$GITHUB_OUTPUT"
          elif [ -f "data/apple_overrides.jsonc" ]; then
            echo "overrides=data/apple_overrides.jsonc" >> "$GITHUB_OUTPUT"
          else
            echo "overrides=" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Apple overrides (if present)
        if: ${{ steps.pick.outputs.overrides != '' }}
        run: |
          echo "Using overrides: ${{ steps.pick.outputs.overrides }}"
          node scripts/enrich/apple_enrich.mjs public/build/dataset.json "${{ steps.pick.outputs.overrides }}" --write public/build/dataset.json

      - name: Refresh version.json hash
        run: |
          node scripts/enrich/version_refresh.mjs public/build/dataset.json public/build/version.json

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- public/build/dataset.json public/build/version.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: ${{ steps.diff.outputs.changed == 'true' }}
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CPR_PAT }}  # PAT with 'repo' scope (or 'contents:write'+'pull-requests:write')
          branch: bot/apple-enrich-${{ github.run_id }}
          title: "chore(data): apply apple overrides to dataset"
          body: |
            This PR was generated by tools-apple-enrich.
            - Built dataset via `clj -T:build publish`
            - Applied overrides from `${{ steps.pick.outputs.overrides }}`
            - Refreshed `public/build/version.json` content hash
          labels: data, bot
          base: main
          add-paths: |
            public/build/dataset.json
            public/build/version.json
          delete-branch: true
          draft: false

      - name: Enable auto-merge (squash)
        if: ${{ steps.cpr.outputs.pull-request-number != '' }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

