# Shim workflow to satisfy required check "Pages / build" on pull_request.
# Real deployment still happens in pages.yml on push to main.
name: Pages

on:
  pull_request:
    paths: ['**']

permissions:
  contents: read

jobs:
  build:
    name: pages-pr-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sanity (PR shim)
        run: echo "✅ Pages PR shim passed"
