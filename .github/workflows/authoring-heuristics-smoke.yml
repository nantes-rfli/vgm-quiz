name: authoring (heuristics smoke)

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'JST date (YYYY-MM-DD). Empty = today'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          # Use the latest stable Clojure CLI per action docs
          # https://github.com/DeLaGuardo/setup-clojure
          cli: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site artifacts (EDN→JSON)
        run: clojure -T:build publish

      - name: Harvest
        run: node scripts/harvest_candidates.js --out public/app/daily_candidates.jsonl

      - name: Merge seeds (allowlist-aware)
        run: |
          node scripts/merge_seed_candidates.mjs \
            --in public/app/daily_candidates.jsonl \
            --seed sources/seed_candidates.jsonl --allow sources/allowlist.json \
            --out public/app/daily_candidates_merged.jsonl

      - name: Score
        run: node scripts/score_candidates.js --in public/app/daily_candidates_merged.jsonl --out public/app/daily_candidates_scored.jsonl

      - name: Enrich (media/start if any)
        run: node scripts/enrich_media_start.js --in public/app/daily_candidates_scored.jsonl --out public/app/daily_candidates_scored_enriched.jsonl

      - name: Heuristics v1 (clip start)
        run: node scripts/clip_start_heuristics_v1.mjs --in public/app/daily_candidates_scored_enriched.jsonl --out public/app/daily_candidates_scored_enriched_start.jsonl

      - name: Generate daily (draft)
        run: |
          if [ -z "${{ inputs.date }}" ]; then
            DATE=$(TZ=Asia/Tokyo date +%F)
          else
            DATE="${{ inputs.date }}"
          fi
          node scripts/generate_daily_from_candidates.js --in public/app/daily_candidates_scored_enriched_start.jsonl --date "$DATE"

      - name: Ensure minimum items (fallback 1)
        run: |
          if [ -z "${{ inputs.date }}" ]; then DATE=""; else DATE="${{ inputs.date }}"; fi
          node scripts/ensure_min_items_v1_post.mjs $([ -n "$DATE" ] && echo "--date $DATE")

      - name: Distractors v1 (post-process)
        run: |
          if [ -z "${{ inputs.date }}" ]; then
            DATE=$(TZ=Asia/Tokyo date +%F)
          else
            DATE="${{ inputs.date }}"
          fi
          node scripts/distractors_v1_post.mjs --in public/app/daily_auto.json --date "$DATE"

      - name: Difficulty v1 (post-process)
        run: |
          if [ -z "${{ inputs.date }}" ]; then
            DATE=$(TZ=Asia/Tokyo date +%F)
          else
            DATE="${{ inputs.date }}"
          fi
          node scripts/difficulty_v1_post.mjs --in public/app/daily_auto.json --date "$DATE"

      - name: Finalize daily (flat shape + required fields)
        run: |
          if [ -z "${{ inputs.date }}" ]; then DATE=""; else DATE="${{ inputs.date }}"; fi
          node scripts/finalize_daily_v1.mjs --in public/app/daily_auto.json $([ -n "$DATE" ] && echo "--date $DATE")

      - name: Validate non-empty (latest or date)
        run: |
          if [ -z "${{ inputs.date }}" ]; then DATE=""; else DATE="${{ inputs.date }}"; fi
          node scripts/validate_nonempty_today.mjs --in public/app/daily_auto.json $([ -n "$DATE" ] && echo "--date $DATE")

      - name: Export today's slim artifact
        run: |
          if [ -z "${{ inputs.date }}" ]; then DATE=""; else DATE="${{ inputs.date }}"; fi
          node scripts/export_today_slim.mjs --in public/app/daily_auto.json $([ -n "$DATE" ] && echo "--date $DATE") --out-json build/daily_today.json --out-md build/daily_today.md

      - name: Validate authoring
        run: node scripts/validate_authoring.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: authoring-heuristics-${{ github.run_id }}
          path: |
            public/app/daily_candidates.jsonl
            public/app/daily_candidates_merged.jsonl
            public/app/daily_candidates_scored.jsonl
            public/app/daily_candidates_scored_enriched.jsonl
            public/app/daily_candidates_scored_enriched_start.jsonl
            public/app/daily_auto.json
            build/daily_today.json
            build/daily_today.md

      - name: KPI summary (authoring today)
        run: node scripts/kpi/append_summary_authoring_today.mjs --in build/daily_today.json
